services:
  sakura:
    image: zakuroai/sakura
    env_file:
      - .env
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: sakura
    volumes:
      - "./:/workspace"
    environment:
      - PYTHONPATH=${PYTHONPATH:-}
      - MASTER_HOST=127.0.0.1
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sakura' && redis-cli ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sakura-dev:
    image: zakuroai/sakura:dev
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: test
    container_name: sakura-dev
    volumes:
      - "./:/workspace"
    environment:
      - PYTHONPATH=${PYTHONPATH:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import sakura'"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: sleep infinity
