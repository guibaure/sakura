version: '3'

tasks:
  baseline:
    desc: Benchmark baseline Lightning trainer
    cmds:
      - python3 main.py --mode baseline {{.CLI_ARGS}}

  sakura:
    desc: Benchmark Sakura trainer
    cmds:
      - python3 main.py --mode sakura {{.CLI_ARGS}}

  both:
    desc: Benchmark both trainers and compare
    cmds:
      - python3 main.py --mode both {{.CLI_ARGS}}

  docker:
    desc: Run benchmark inside the sakura-dev container
    preconditions:
      - sh: docker ps --format '{{`{{.Names}}`}}' | grep -q sakura-dev
        msg: "sakura-dev container is not running. Start it with: docker compose up sakura-dev -d"
    cmds:
      - docker exec sakura-dev python3 main.py {{.CLI_ARGS | default "--mode baseline --epochs 3"}}
