version: '3'

vars:
  PKG_NAME: sakura

tasks:
  build-image:
    desc: Build the Docker image via docker compose
    preconditions:
      - sh: command -v docker
        msg: "docker is required but not installed."
    cmds:
      - docker compose build

  build:
    desc: Full build (wheel + docker image)
    cmds:
      - task: build:wheel
      - task: build-image

  run:
    desc: Run services via docker compose
    preconditions:
      - sh: command -v docker
        msg: "docker is required but not installed."
    cmds:
      - docker compose down
      - docker compose up {{.ENV}} -d
    vars:
      ENV: '{{.ENV | default ""}}'

  shell:
    desc: Launch docker compose and open a bash shell
    preconditions:
      - sh: command -v docker
        msg: "docker is required but not installed."
    cmds:
      - docker compose up -d
      - docker exec -it sakura bash
