version: '3'

tasks:
  run:
    desc: Run pytest test suite
    cmds:
      - pytest {{.CLI_ARGS | default "tests/ -v"}}

  docker:
    desc: Run pytest test suite inside a Docker container
    preconditions:
      - sh: command -v docker
        msg: "docker is required but not installed."
    cmds:
      - >-
        docker build
        -f docker/Dockerfile
        --target test
        -t sakura-test .
      - docker run --rm sakura-test
