version: '3'

dotenv:
  - .env

vars:
  PKG_NAME: sakura
  VERSION:
    sh: python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"

includes:
  build:
    taskfile: taskfiles/build.yml
    optional: true
  docker:
    taskfile: taskfiles/docker.yml
    optional: true
  test:
    taskfile: taskfiles/test.yml
    optional: true
  bench:
    taskfile: taskfiles/bench.yml
    optional: true

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  help:
    desc: Display project version and usage info
    cmds:
      - echo "{{.PKG_NAME}} v{{.VERSION}}"
      - echo "Usage{{":"}} task {build:wheel, docker:run, ...}"
      - echo "Please check README.md for instructions"

  setup:
    desc: Install prerequisites and verify environment
    cmds:
      - echo "Checking prerequisites..."
      - cmd: command -v docker >/dev/null && echo "docker OK" || echo "docker NOT FOUND"
      - cmd: command -v uv >/dev/null && echo "uv OK" || echo "uv NOT FOUND"
      - cmd: command -v task >/dev/null && echo "task OK" || echo "task NOT FOUND"
